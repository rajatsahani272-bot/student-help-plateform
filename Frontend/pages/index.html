<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HomePaget</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">

</head>

<body>
  <main class="main-container">
    <div class="sidebar" id="sidebar-container">
     
    </div>
    <div class="content">
      <div class="intro-section">
        <div class="intro-heading">
          <h1>Welcome to StudentGuider</h1>
        </div>
        <div class="intro-para">
          <p>Ask doubts, Share resources, and Chat with Students </p>
        </div>
        <div class="button-section">
          <span><button class="btn-1">Intership</button></span>
          <span><button class="btn-2">Placement Cell</button></span>
        </div>
      </div>
      <hr>
      <!-- Card-section -->
      <div class="card-section">
        <!-- card-1-anchor -->
        <a class="card-anchor" href="../pages/ask-doubt.html">
          <div class="card-1">
            <div class="card-img">
              <img class="ask-doubts-img" src="../assets/images/Ask-Doubts.png" alt="Ask-Doubts">
            </div>
            <div class="card-title">
              <p>Post your question and get your answer from Ai </p>
            </div>
          </div>
        </a>
        <!-- card-2-anchor -->
        <a class="card-anchor" href="../pages/resources.html">
          <div class="card-3">
            <div class="card-img">
              <img class="resources-img" src="../assets/images/resources.png" alt="resources">
            </div>
            <div class="card-title" id="res-card">
              <p>Access notes , PDF, and study material easily.</p>
            </div>
          </div>
        </a>
        <!-- card 3 anchor -->
         <a class="card-anchor" href="quiz.html">
          <div class="card-2">
            <div class="card-img">
              <img class="chat-img" src="../assets/images/Test your knowledge with quizzes.png" alt="chat">
            </div>
            <div class="card-title">
              <p>Take quizz and test your knowledge.</p>
            </div>
          </div>
        </a>
      </div>
    </div>
  </main>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../components//sidebar.js"></script>
  <script src="../js/main.js"></script>
</body>

</html>
