<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/quiz.css">

</head>

<body>
    <main>
        <div class="main-container">
            <div class="sidebar" id="sidebar-container">
            </div>
            <div class="container">
               <div class="quiz-container">
                 <h2>Quiz App</h2>

                <button class="button-quiz" onclick="startQuiz()">Start Quiz</button>

                <div id="quizContainer" class="hidden">

                    <div id="progressBar">
                        <div id="progress"></div>
                    </div>

                    <div id="timer">Time: 60s</div>

                    <div id="questionBox"></div>

                    <div class="btns">
                        <button class="button-quiz" onclick="prevQuestion()">Prev</button>
                        <button class="button-quiz" onclick="nextQuestion()">Next</button>
                    </div>

                    <button class="button-quiz" onclick="submitQuiz()">Submit</button>
                </div>

                <div id="resultBox"></div>
               </div>
            </div>
        </div>
    </main>
    <script src="components/sidebar.js"></script>
    <script src="js/main.js"></script>
    <script src="js/quizz.js"></script>
</body>

</html>
